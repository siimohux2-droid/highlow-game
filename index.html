<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ハイ＆ローカードゲーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px 20px;
  }

  h1 {
    font-size: 1.3rem;
    letter-spacing: 4px;
    color: #a0c4ff;
    margin-bottom: 12px;
  }

  /* ステータスバー */
  #status-bar {
    display: flex;
    background: #16213e;
    border: 1px solid #334;
    border-radius: 10px;
    padding: 10px 20px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 480px;
    justify-content: space-between;
  }

  .stat-block { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .stat-label { font-size: 0.65rem; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  .hearts     { font-size: 1rem; letter-spacing: 1px; }

  /* ---- 戦闘エリア ---- */
  #battle-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
  }

  /* 敵エリア（上） */
  #enemy-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    width: 100%;
  }

  #enemy-info {
    font-size: 0.8rem;
    color: #ffd166;
    letter-spacing: 3px;
  }

  /* VS ライン */
  #vs-line {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin: 8px 0;
    color: #333;
    font-size: 0.7rem;
    letter-spacing: 2px;
  }
  #vs-line::before, #vs-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #333;
  }

  /* 自分エリア（下） */
  #player-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-label { font-size: 0.7rem; color: #666; letter-spacing: 2px; margin-bottom: 2px; }

  /* ---- カード共通 ---- */
  .card {
    width: 96px;
    height: 134px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    font-weight: bold;
    border: 2px solid #555;
  }

  .card.hidden {
    background: linear-gradient(135deg, #2d3561, #1a1a4e);
    border-color: #4a4aaa;
    color: #4a4aaa;
    box-shadow: 0 4px 14px rgba(74,74,170,0.3);
  }

  .card.revealed {
    background: linear-gradient(135deg, #1e3a5f, #0d2137);
    border-color: #a0c4ff;
    color: #a0c4ff;
    box-shadow: 0 4px 18px rgba(160,196,255,0.5);
    animation: flipIn 0.35s ease;
  }

  .card.enemy-normal {
    background: linear-gradient(135deg, #3a1a1a, #2a0d0d);
    border-color: #ff6b6b;
    color: #ff6b6b;
    box-shadow: 0 4px 14px rgba(255,107,107,0.3);
  }

  .card.enemy-midboss {
    background: linear-gradient(135deg, #3a2a00, #2a1a00);
    border-color: #ffd166;
    color: #ffd166;
    box-shadow: 0 4px 14px rgba(255,209,102,0.3);
  }

  .card.enemy-boss {
    background: linear-gradient(135deg, #2a003a, #1a0028);
    border-color: #cc44ff;
    color: #cc44ff;
    box-shadow: 0 4px 20px rgba(200,50,255,0.5);
  }

  .card.hand-card {
    background: linear-gradient(135deg, #1e3a5f, #0d2137);
    border-color: #a0c4ff;
    color: #a0c4ff;
    box-shadow: 0 4px 20px rgba(160,196,255,0.5);
    width: 72px;
    height: 100px;
    font-size: 2rem;
  }

  @keyframes flipIn {
    0%   { transform: rotateY(90deg); opacity: 0; }
    100% { transform: rotateY(0deg);  opacity: 1; }
  }

  /* 結果 */
  #result-display {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 3px;
  }
  .result-win  { color: #06d6a0; text-shadow: 0 0 10px rgba(6,214,160,0.5); }
  .result-lose { color: #ff6b6b; text-shadow: 0 0 10px rgba(255,107,107,0.5); }
  .result-draw { color: #888; }

  /* 山札表示 */
  #deck-display {
    width: 100%;
    max-width: 480px;
    margin-top: 12px;
  }
  #deck-display-label {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 6px;
  }
  #deck-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .deck-chip {
    width: 36px;
    height: 50px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: bold;
    background: linear-gradient(135deg, #1e3a5f, #0d2137);
    border: 1px solid #4a7aaa;
    color: #a0c4ff;
  }

  /* ボタン */
  #buttons {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }

  .btn {
    width: 116px;
    height: 46px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
  }
  .btn:active:not(:disabled) { transform: scale(0.96); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #btn-high {
    background: linear-gradient(135deg, #0066cc, #003d7a);
    color: #fff;
    border: 1px solid #4499ff;
    box-shadow: 0 3px 10px rgba(0,102,204,0.4);
  }
  #btn-high:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(0,153,255,0.6); }

  #btn-low {
    background: linear-gradient(135deg, #cc3300, #7a1e00);
    color: #fff;
    border: 1px solid #ff6644;
    box-shadow: 0 3px 10px rgba(204,51,0,0.4);
  }
  #btn-low:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(255,80,40,0.6); }

  #btn-draw {
    background: linear-gradient(135deg, #2a5a2a, #1a3a1a);
    color: #06d6a0;
    border: 1px solid #06d6a0;
    box-shadow: 0 3px 10px rgba(6,214,160,0.3);
    width: 116px;
    height: 46px;
  }
  #btn-draw:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(6,214,160,0.6); }

  /* ログ */
  #log-area {
    background: #0d1117;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px 14px;
    width: 100%;
    min-height: 100px;
    font-size: 0.8rem;
    line-height: 1.9;
    color: #777;
  }
  .log-win    { color: #06d6a0; }
  .log-lose   { color: #ff6b6b; }
  .log-add    { color: #ffd166; }
  .log-system { color: #555; font-style: italic; }

  /* ステージ入場オーバーレイ */
  #stage-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 20, 0.93);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 50;
    animation: fadeIn 0.4s ease;
  }
  #stage-overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #stage-label {
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 4px;
  }

  #stage-enemy-name {
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 4px;
    color: #ffd166;
    text-shadow: 0 0 20px rgba(255,209,102,0.5);
    margin-bottom: 4px;
  }
  #stage-enemy-name.midboss-name {
    color: #ff9944;
    text-shadow: 0 0 24px rgba(255,100,30,0.6);
  }
  #stage-enemy-name.boss-name {
    color: #cc44ff;
    text-shadow: 0 0 28px rgba(200,50,255,0.7);
  }

  .hand-label {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 3px;
    margin-top: 8px;
  }

  #hand-display {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 4px 0 12px;
    max-width: 360px;
  }

  #btn-battle-start {
    background: linear-gradient(135deg, #2a5a2a, #1a3a1a);
    color: #06d6a0;
    border: 1px solid #06d6a0;
    border-radius: 8px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(6,214,160,0.3);
    transition: box-shadow 0.2s;
  }
  #btn-battle-start:hover { box-shadow: 0 4px 20px rgba(6,214,160,0.6); }

  /* 報酬・廃棄 共通オーバーレイ */
  .sub-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 80;
    animation: fadeIn 0.3s ease;
  }
  .sub-overlay.show { display: flex; }

  .sub-overlay-title {
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 4px;
    color: #06d6a0;
    text-shadow: 0 0 16px rgba(6,214,160,0.6);
  }
  .sub-overlay-sub {
    font-size: 0.78rem;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .sub-overlay-note {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 1px;
  }

  .reward-options, .discard-options {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin: 4px 0;
  }

  .reward-card {
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .reward-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 24px rgba(160,196,255,0.7) !important;
  }

  .discard-card {
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    background: linear-gradient(135deg, #1e3a5f, #0d2137) !important;
    border-color: #a0c4ff !important;
    color: #a0c4ff !important;
  }
  .discard-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(255,107,107,0.6) !important;
    border-color: #ff6b6b !important;
    color: #ff6b6b !important;
  }

  .btn-sub {
    background: transparent;
    color: #555;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 24px;
    font-size: 0.82rem;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-sub:hover { color: #aaa; border-color: #666; }

  /* 設定ボタン（右上固定） */
  #settings-btn {
    position: fixed;
    top: 14px;
    right: 16px;
    background: #16213e;
    border: 1px solid #334;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    color: #666;
    z-index: 200;
    transition: color 0.2s, border-color 0.2s;
  }
  #settings-btn:hover { color: #a0c4ff; border-color: #4a6aaa; }

  /* 設定パネル */
  #settings-panel {
    display: none;
    position: fixed;
    top: 56px;
    right: 16px;
    background: #16213e;
    border: 1px solid #334;
    border-radius: 10px;
    padding: 8px;
    z-index: 200;
    min-width: 140px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  #settings-panel.open { display: block; }

  #btn-quit {
    display: block;
    width: 100%;
    background: transparent;
    color: #888;
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 0.78rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  #btn-quit:hover { background: rgba(255,107,107,0.12); color: #ff6b6b; }

  /* ゲーム終了オーバーレイ */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.84);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }
  #overlay.show { display: flex; }

  #overlay-title {
    font-size: 3rem;
    font-weight: bold;
    letter-spacing: 8px;
  }
  .title-clear    { color: #06d6a0; text-shadow: 0 0 30px rgba(6,214,160,0.8); }
  .title-gameover { color: #ff6b6b; text-shadow: 0 0 30px rgba(255,107,107,0.8); }

  #overlay-sub { color: #666; font-size: 0.9rem; letter-spacing: 2px; }

  #btn-restart, #btn-play-again {
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
  }
  #btn-play-again {
    background: linear-gradient(135deg, #0066cc, #003d7a);
    color: #fff;
    border: 1px solid #4499ff;
    box-shadow: 0 3px 10px rgba(0,102,204,0.4);
  }
  #btn-play-again:hover { box-shadow: 0 4px 16px rgba(0,153,255,0.6); }
  #btn-restart {
    background: transparent;
    color: #888;
    border: 1px solid #444;
  }
  #btn-restart:hover { color: #ccc; border-color: #888; }

  /* タイトル画面 */
  #title-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    z-index: 300;
  }
  #title-screen.show { display: flex; }

  #title-logo {
    font-size: 3.2rem;
    font-weight: bold;
    letter-spacing: 10px;
    color: #a0c4ff;
    text-shadow: 0 0 40px rgba(160,196,255,0.6), 0 0 80px rgba(160,196,255,0.3);
    animation: titlePulse 2.4s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 40px rgba(160,196,255,0.5), 0 0 80px rgba(160,196,255,0.2); }
    50%       { text-shadow: 0 0 60px rgba(160,196,255,0.9), 0 0 120px rgba(160,196,255,0.4); }
  }

  #btn-title-start {
    background: linear-gradient(135deg, #0066cc, #003d7a);
    color: #fff;
    border: 1px solid #4499ff;
    border-radius: 10px;
    padding: 16px 56px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 5px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,102,204,0.5);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  #btn-title-start:hover {
    box-shadow: 0 6px 30px rgba(0,153,255,0.7);
    transform: translateY(-2px);
  }
  #btn-title-start:active { transform: scale(0.97); }

  #title-version {
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 2px;
    margin-top: -24px;
  }
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="title-screen" class="show">
  <div id="title-logo">HIGH &amp; LOW</div>
  <button id="btn-title-start">START</button>
  <div id="title-version">v1.4.0</div>
</div>

<h1>HIGH &amp; LOW</h1>

<!-- 設定ボタン＆パネル -->
<div id="settings-btn">⚙</div>
<div id="settings-panel">
  <button id="btn-quit">↩ 最初に戻る</button>
</div>

<div id="status-bar">
  <div class="stat-block">
    <span class="stat-label">Your HP</span>
    <div id="player-hearts" class="hearts" style="color:#ff6b6b">♥♥♥♥♥</div>
  </div>
  <div class="stat-block">
    <span class="stat-label">Enemy HP</span>
    <div id="enemy-hearts" class="hearts" style="color:#ffd166">♦</div>
  </div>
  <div class="stat-block">
    <span class="stat-label">Deck</span>
    <div id="deck-count" style="font-size:1rem;font-weight:bold;color:#06d6a0">5</div>
  </div>
</div>

<div id="battle-screen">
  <div id="enemy-area">
    <div class="card-label">ENEMY CARD</div>
    <div id="enemy-card" class="card enemy-normal">-</div>
    <div id="enemy-info" style="margin-top:6px">通常敵 A</div>
  </div>

  <div id="vs-line">VS</div>

  <div id="player-area">
    <div class="card-label">YOUR CARD</div>
    <div id="player-card" class="card hidden">?</div>
    <div id="result-display"></div>
  </div>

  <div id="buttons">
    <button class="btn" id="btn-high">HIGH</button>
    <button class="btn" id="btn-low">LOW</button>
    <button class="btn" id="btn-draw">DRAW</button>
  </div>

  <div id="log-area"></div>
</div>

<!-- 山札表示 -->
<div id="deck-display">
  <div id="deck-display-label">DECK</div>
  <div id="deck-cards"></div>
</div>

<div id="stage-overlay">
  <div id="stage-label">STAGE</div>
  <div id="stage-enemy-name">通常敵 A</div>
  <div class="hand-label">— あなたの初期手札 —</div>
  <div id="hand-display"></div>
  <button id="btn-battle-start">戦闘開始</button>
</div>

<!-- 報酬選択オーバーレイ -->
<div id="reward-overlay" class="sub-overlay">
  <div class="sub-overlay-title">VICTORY!</div>
  <div id="reward-subtitle" class="sub-overlay-sub">カードを1枚選んでデッキに加えよう</div>
  <div class="reward-options" id="reward-options"></div>
  <div id="reward-deck-note" class="sub-overlay-note"></div>
  <button class="btn-sub" id="btn-reward-draw-discard" style="display:none;color:#ffd166;border-color:#555">↓ カードを削除する（引き分けボーナス）</button>
  <button class="btn-sub" id="btn-reward-skip">スキップ</button>
</div>

<!-- 廃棄選択オーバーレイ（中ボス撃破後） -->
<div id="discard-overlay" class="sub-overlay">
  <div class="sub-overlay-title" style="color:#ffd166;text-shadow:0 0 16px rgba(255,209,102,0.6)">中ボス撃破！</div>
  <div class="sub-overlay-sub">山札から1枚廃棄できます</div>
  <div class="discard-options" id="discard-options"></div>
  <button class="btn-sub" id="btn-discard-skip">廃棄しない</button>
</div>

<div id="overlay">
  <div id="overlay-title"></div>
  <div id="overlay-sub"></div>
  <div id="overlay-buttons" style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px;">
    <button id="btn-play-again" style="display:none;">もう一度遊ぶ</button>
    <button id="btn-restart">タイトルに戻る</button>
  </div>
</div>

<script>
const INITIAL_HAND = 7;

// 最大30ステージ：通常×3 → 中ボス → 通常×3 → ボス を繰り返す
function generateEnemySequence(maxStages) {
  const pattern = [
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: '中ボス', hp: 2, type: 'midboss' },
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: '通常敵', hp: 1, type: 'normal'  },
    { name: 'ボス',   hp: 3, type: 'boss'    },
  ];
  const result = [];
  for (let i = 0; i < maxStages; i++) {
    result.push({ ...pattern[i % pattern.length] });
  }
  return result;
}

let playerHp, deck, logs, enemyIndex, enemies, phase,
    currentPlayerCard, currentEnemyCard, isFirstTurn, plannedTurns;

function initGame() {
  playerHp = 5;
  deck = createDeck();
  logs = [];
  enemyIndex = 0;
  enemies = generateEnemySequence(30);
  phase = 'wait';
  currentPlayerCard = null;
  currentEnemyCard  = null;
  isFirstTurn = true;
  plannedTurns = null;

  document.getElementById('overlay').classList.remove('show');
  document.getElementById('result-display').textContent = '';

  renderStatus();
  setButtons(false);
  showStageEntry();
}

function showStageEntry() {
  const enemy = enemies[enemyIndex];
  document.getElementById('stage-label').textContent = `STAGE ${enemyIndex + 1}`;
  const nameEl = document.getElementById('stage-enemy-name');
  nameEl.textContent = enemy.name;
  nameEl.className = enemy.type === 'boss' ? 'boss-name' : enemy.type === 'midboss' ? 'midboss-name' : '';
  // 現在のデッキの中身を全て表示
  document.getElementById('hand-display').innerHTML =
    deck.map(c => `<div class="card hand-card">${c}</div>`).join('');
  document.getElementById('stage-overlay').classList.add('show');
}

// 中ボス・ボス戦の全ターンを事前確定。
// drawTurnIdx のターンだけプレイヤーカード＝敵カード（DRAW成立保証）。
// 他ターンは敵カードがプレイヤーカードと一致しないよう生成。
function planBossBattle(enemy) {
  const hp = enemy.hp;
  const isBoss = enemy.type === 'boss';
  const drawTurnIdx = Math.floor(Math.random() * hp);
  const turns = [];
  for (let i = 0; i < hp; i++) {
    if (i === drawTurnIdx) {
      const matchCard = deck[Math.floor(Math.random() * deck.length)];
      turns.push({ playerCard: matchCard, enemyCard: matchCard });
    } else {
      const pCard = deck[Math.floor(Math.random() * deck.length)];
      const eCard = generateEnemyCard(pCard, isBoss); // pCardと一致しない値
      turns.push({ playerCard: pCard, enemyCard: eCard });
    }
  }
  return turns;
}

function closeStageEntry() {
  document.getElementById('stage-overlay').classList.remove('show');
  addLog('log-system', `--- ${enemies[enemyIndex].name} との戦闘開始！ ---`);
  const enemy = enemies[enemyIndex];
  plannedTurns = (enemy.type === 'midboss' || enemy.type === 'boss')
    ? planBossBattle(enemy)
    : null;
  renderStatus();
  setButtons(true);
  startTurn();
}

function createDeck() {
  return [7];  // 初期デッキは7の1枚のみ
}

function drawCard() {
  // カードは破棄せず、デッキからランダムに1枚選ぶだけ
  const idx = Math.floor(Math.random() * deck.length);
  return deck[idx];
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ボス戦では1と13の出現確率を通常の約1/3に抑えたプール
const BOSS_POOL = (() => {
  const pool = [];
  for (let i = 2; i <= 12; i++) pool.push(i, i, i); // 2-12: 各3回
  pool.push(1, 13);                                   // 1,13: 各1回
  return pool;
})();

function generateEnemyCard(exclude, isBoss) {
  let card;
  const pool = isBoss ? BOSS_POOL : null;
  do {
    card = pool ? pool[Math.floor(Math.random() * pool.length)] : rand(1, 13);
  } while (exclude !== undefined && card === exclude);
  return card;
}

function startTurn() {
  const enemy = enemies[enemyIndex];

  if (plannedTurns && plannedTurns.length > 0) {
    // 中ボス・ボス：事前確定ターンを使用
    const turn = plannedTurns.shift();
    currentPlayerCard = turn.playerCard;
    currentEnemyCard  = turn.enemyCard;
  } else {
    // 通常敵：ランダム生成（初回は引き分け除外）
    currentPlayerCard = drawCard();
    const isBoss = enemy.type === 'boss';
    currentEnemyCard = isFirstTurn
      ? generateEnemyCard(currentPlayerCard, isBoss)
      : generateEnemyCard(undefined, isBoss);
    isFirstTurn = false;
  }

  const pc = document.getElementById('player-card');
  pc.textContent = '?';
  pc.className = 'card hidden';
  document.getElementById('result-display').textContent = '';
  document.getElementById('enemy-card').textContent = currentEnemyCard;

  renderStatus();
  setButtons(true);
  phase = 'wait';
}

function onChoice(choice) {
  if (phase === 'animating') return;
  phase = 'animating';
  setButtons(false);

  const enemy = enemies[enemyIndex];

  addLog('', `相手：${currentEnemyCard}`);

  const p = currentPlayerCard;
  const e = currentEnemyCard;
  // DRAW選択時：一致→勝利(+削除ボーナス)、不一致→敗北
  // HIGH/LOW選択時：従来通り。引き分けはDRAWを選ばない限り発生しない
  const isDraw = choice === 'draw' ? (p === e) : false;
  const won    = choice === 'draw'
    ? (p === e)                          // DRAW選択: 一致で勝利
    : (choice === 'high' ? p > e : p < e); // HIGH/LOW: 大小で判定
  const draw   = false; // HIGH/LOW選択では引き分けは存在しない

  const pc = document.getElementById('player-card');
  pc.textContent = p;
  pc.className = 'card revealed';

  setTimeout(() => {
    const rd = document.getElementById('result-display');

    if (isDraw) {
      rd.textContent = '引き分け → 即時勝利！';
      rd.className = 'result-win';
      addLog('log-win', `あなた：${p} → 引き分け（即時勝利！）`);
      enemy.hp = 0; // 残りHPに関係なく即時撃破
    } else if (won) {
      rd.textContent = '★ 勝利！';
      rd.className = 'result-win';
      addLog('log-win', `あなた：${p} → 勝利！`);
      enemy.hp -= 1;
    } else {
      rd.textContent = '✗ 敗北…';
      rd.className = 'result-lose';
      addLog('log-lose', `あなた：${p} → 敗北…`);
      playerHp -= 1;
    }

    renderStatus();
    renderDeck();

    setTimeout(() => {
      if (playerHp <= 0) {
        showOverlay('GAME OVER', `${enemy.name}に倒されました`, 'title-gameover');
        return;
      }
      if (enemy.hp <= 0) {
        // 敵撃破 → 報酬選択 → (中ボスなら廃棄選択) → 次ステージ
        showRewardScreen(e, enemy, isDraw, () => {
          if (enemy.type === 'midboss') {
            showDiscardScreen(() => proceedToNextStage());
          } else {
            proceedToNextStage();
          }
        });
        return;
      }
      startTurn();
    }, 900);
  }, 400);
}

function renderStatus() {
  document.getElementById('player-hearts').textContent =
    '♥'.repeat(playerHp) + '♡'.repeat(Math.max(0, 5 - playerHp));
  const enemy = enemies[enemyIndex];
  document.getElementById('enemy-hearts').textContent = '♦'.repeat(enemy.hp);
  document.getElementById('enemy-info').textContent =
    enemy.name + (enemy.type === 'boss' ? '  👑' : enemy.type === 'midboss' ? '  ⚡' : '');
  const cardClass = enemy.type === 'boss' ? 'enemy-boss'
    : enemy.type === 'midboss' ? 'enemy-midboss' : 'enemy-normal';
  document.getElementById('enemy-card').className = 'card ' + cardClass;
  document.getElementById('deck-count').textContent = deck.length;
  renderDeck();
}

function renderDeck() {
  // デッキの全カードを常に表示（使っても破棄しないので常に全枚見える）
  document.getElementById('deck-cards').innerHTML =
    deck.map(c => `<div class="deck-chip">${c}</div>`).join('');
}

function addLog(cls, text) {
  logs.push({ cls, text });
  if (logs.length > 5) logs.shift();
  document.getElementById('log-area').innerHTML =
    logs.map(l => `<div class="${l.cls}">${l.text}</div>`).join('');
}

function setButtons(enabled) {
  document.getElementById('btn-high').disabled = !enabled;
  document.getElementById('btn-low').disabled  = !enabled;
  document.getElementById('btn-draw').disabled = !enabled;
}

// 報酬カードの選択肢を生成（半分・元値・倍、1〜13の範囲）
// 通常・中ボスは1と13を除外。重複禁止。
// デッキ満杯時は現在の最小より小さい、または最大より大きいカードのみ提示（強制トレード対象）
function getRewardOptions(enemyCard, enemyType) {
  const opts = new Set();
  const half   = Math.floor(enemyCard / 2);
  const double = enemyCard * 2;
  if (half >= 1)    opts.add(half);
  opts.add(enemyCard);
  if (double <= 13) opts.add(double);

  if (enemyType !== 'boss') {
    opts.delete(1);
    opts.delete(13);
  }

  let filtered = [...opts].filter(v => v >= 1 && v <= 13 && !deck.includes(v));

  if (deck.length >= 5) {
    const deckMin = Math.min(...deck);
    const deckMax = Math.max(...deck);
    filtered = filtered.filter(v => v < deckMin || v > deckMax);
  }

  return filtered.slice(0, 3);
}

function proceedToNextStage() {
  enemyIndex += 1;
  if (enemyIndex >= enemies.length) {
    showOverlay('CLEAR！', '全ての敵を撃破！', 'title-clear', true);
    return;
  }
  setButtons(false);
  showStageEntry();
}

function showRewardScreen(enemyCard, enemy, isDraw, onDone) {
  const options   = getRewardOptions(enemyCard, enemy.type);
  const deckFull    = deck.length >= 5;
  const noOptions   = options.length === 0;
  const canAdd      = !noOptions;  // 満杯でも強制トレードで追加可能
  const isMandatory = enemy.type === 'normal' && canAdd;
  const showDrawDiscard = isDraw && enemy.type !== 'boss';

  // 満杯時のトレード対象を事前計算
  const deckMin = deckFull ? Math.min(...deck) : null;
  const deckMax = deckFull ? Math.max(...deck) : null;

  // サブタイトル
  document.getElementById('reward-subtitle').textContent =
    noOptions && deckFull ? '追加できるカードがありません（満杯・範囲外なし）' :
    noOptions             ? '追加できるカードがありません（重複なし）' :
    deckFull              ? `デッキ満杯：最小(${deckMin})または最大(${deckMax})と強制交換` :
    isMandatory           ? 'カードを1枚選んでデッキに加えよう（必須）' :
                            'カードを1枚選んでデッキに加えよう';
  document.getElementById('reward-deck-note').textContent =
    `現在のデッキ：${deck.length} / 5 枚`;

  // カード選択肢（満杯時は強制トレード対象を明示）
  const optEl = document.getElementById('reward-options');
  optEl.innerHTML = canAdd ? options.map(c => {
    let tradeLabel = '';
    if (deckFull) {
      tradeLabel = c < deckMin
        ? `<div style="font-size:0.55rem;color:#ffd166;margin-top:2px">→ ${deckMin}と交換</div>`
        : `<div style="font-size:0.55rem;color:#ffd166;margin-top:2px">→ ${deckMax}と交換</div>`;
    }
    return `<div class="card revealed reward-card" data-value="${c}" style="height:auto;padding:12px 8px;display:flex;flex-direction:column;align-items:center;">${c}${tradeLabel}</div>`;
  }).join('') : '';

  // 削除ボタン（引き分けボーナス）
  const drawDiscardBtn = document.getElementById('btn-reward-draw-discard');
  drawDiscardBtn.style.display = (showDrawDiscard && deck.length > 0) ? 'block' : 'none';

  // スキップボタン：通常敵で選択肢ありの場合のみ非表示
  const skipBtn = document.getElementById('btn-reward-skip');
  skipBtn.style.display = isMandatory ? 'none' : 'inline-block';

  // イベント再設定（cloneNodeで古いリスナーを除去）
  const newSkip = skipBtn.cloneNode(true);
  skipBtn.parentNode.replaceChild(newSkip, skipBtn);
  const newDrawDiscard = drawDiscardBtn.cloneNode(true);
  drawDiscardBtn.parentNode.replaceChild(newDrawDiscard, drawDiscardBtn);

  const closeReward = () => {
    document.getElementById('reward-overlay').classList.remove('show');
    onDone();
  };

  optEl.querySelectorAll('.reward-card').forEach(cardEl => {
    cardEl.addEventListener('click', () => {
      const val = parseInt(cardEl.dataset.value);
      if (deckFull) {
        // 強制トレード：新カードが最小未満→最小と交換、最大超→最大と交換
        const tradeVal = val < deckMin ? deckMin : deckMax;
        const tradeIdx = deck.indexOf(tradeVal);
        deck.splice(tradeIdx, 1, val);
        addLog('log-add', `強制交換：${tradeVal} → ${val}（デッキ ${deck.length} 枚）`);
      } else if (!deck.includes(val)) {
        deck.push(val);
        addLog('log-add', `カード獲得：${val}（デッキ ${deck.length} 枚）`);
      }
      renderStatus();
      closeReward();
    });
  });

  newDrawDiscard.addEventListener('click', () => {
    document.getElementById('reward-overlay').classList.remove('show');
    // 削除画面を開き、完了後に onDone
    showDiscardScreen(onDone);
  });

  newSkip.addEventListener('click', closeReward);

  document.getElementById('reward-overlay').classList.add('show');
}

function showDiscardScreen(onDone) {
  const optEl = document.getElementById('discard-options');
  optEl.innerHTML = deck.map((c, i) =>
    `<div class="card discard-card" data-index="${i}">${c}</div>`
  ).join('');

  const skipBtn = document.getElementById('btn-discard-skip');
  const newSkip = skipBtn.cloneNode(true);
  skipBtn.parentNode.replaceChild(newSkip, skipBtn);

  optEl.querySelectorAll('.discard-card').forEach(cardEl => {
    cardEl.addEventListener('click', () => {
      const idx = parseInt(cardEl.dataset.index);
      const removed = deck[idx];
      deck.splice(idx, 1);
      addLog('log-system', `カード廃棄：${removed}（デッキ ${deck.length} 枚）`);
      renderStatus();
      document.getElementById('discard-overlay').classList.remove('show');
      onDone();
    });
  });

  newSkip.addEventListener('click', () => {
    document.getElementById('discard-overlay').classList.remove('show');
    onDone();
  });

  document.getElementById('discard-overlay').classList.add('show');
}

function showOverlay(title, sub, cls, isClear) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-title').className = cls;
  document.getElementById('overlay-sub').textContent = sub;
  document.getElementById('btn-play-again').style.display = isClear ? 'block' : 'none';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('btn-high').addEventListener('click', () => onChoice('high'));
document.getElementById('btn-low').addEventListener('click',  () => onChoice('low'));
document.getElementById('btn-draw').addEventListener('click', () => onChoice('draw'));
document.getElementById('btn-battle-start').addEventListener('click', closeStageEntry);
document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('title-screen').classList.add('show');
});
document.getElementById('btn-play-again').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  initGame();
});
document.getElementById('btn-quit').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('title-screen').classList.add('show');
});
document.getElementById('settings-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('settings-panel').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('open');
});

document.getElementById('btn-title-start').addEventListener('click', () => {
  document.getElementById('title-screen').classList.remove('show');
  initGame();
});
</script>
</body>
</html>
